services:
  # Free-tier deployment: single web service only.
  # Notes:
  # - No Render-managed Postgres/Key Value resources in this Blueprint.
  # - No persistent disk on free tier; uploads use ephemeral filesystem.
  - type: web
    name: streamdocs
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: virginia
    numInstances: 1
    healthCheckPath: /api/v1/utils/health-check/
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: StreamDocs

      # Secrets
      - key: SECRET_KEY
        generateValue: true
      - key: FIRST_SUPERUSER
        value: admin@streamdocs.com
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false

      # Database connection (external Postgres)
      - key: DATABASE_URL
        sync: false

      # Redis / Celery broker+backend (external Redis/Valkey)
      - key: REDIS_URL
        sync: false

      # Uploads
      - key: UPLOAD_DIR
        value: /tmp/uploads

      # App URLs (set to your final Render URL or custom domain)
      - key: FRONTEND_HOST
        sync: false

      # Optional: skip prestart if you ever need a “no-migrations” deploy
      # - key: RUN_PRESTART
      #   value: "1"

      # Optional: tune worker concurrency
      # - key: CELERY_WORKER_CONCURRENCY
      #   value: "2"
